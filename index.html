<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Dashboard</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container-fluid">

  <!-- HEADER -->
  <div class="header-section">

    <div class="clocks mb-2">
      <iframe src="https://free.timeanddate.com/clock/ia4vsg4z/n250/tlca/fs72/ftb/pa10/tt1/tm1"></iframe>
      <iframe src="https://free.timeanddate.com/clock/ia4vsg4z/n250/tlca/fs132/ftb/"></iframe>
    </div>

    <!-- Segmented Duty Toggle -->
    <div class="toggle-group">
      <button id="mediumBtn" class="toggle-btn active">Medium Duty</button>
      <button id="lightBtn" class="toggle-btn">Light Duty</button>
    </div>

    <h1>Production Dashboard</h1>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div id="output"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
